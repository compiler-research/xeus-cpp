name: xeus-cpp
channels:
  - conda-forge
dependencies:
  # Build dependencies
  - make
  - cmake
  - clangxx # [not win]
  - cxx-compiler # [win]
  # Host dependencies
  - xeus>=6.0.0
  - xeus-zmq
  - nlohmann_json
  - nlohmann_json-abi
  - CppInterOp>=1.8
  - pugixml
  - cpp-argparse
  - llvm-openmp
  - curl
  - libcurl
  - libcurl-static
  # Test dependencies
  - pytest
  - jupyter_kernel_test<0.8
  - papermill
  - nbformat
  - nbval
  - pytest-rerunfailures
  - doctest
