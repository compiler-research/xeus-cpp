name: xeus-cpp
channels:
  - conda-forge
dependencies:
  # Build dependencies
  - make
  - cmake
  - sel(unix): clangxx=21
  - sel(win): cxx-compiler
  - sel(linux): cxx-compiler
  # Host dependencies
  - xeus>=6.0.0
  - xeus-zmq
  - nlohmann_json
  - nlohmann_json-abi
  - CppInterOp>=1.9
  - pugixml
  - cpp-argparse
  - sel(unix): llvm-openmp=21
  - curl
  - libcurl
  - libcurl-static
  # Test dependencies
  - pytest
  - jupyter_kernel_test<0.8
  - papermill
  - nbformat
  - nbval
  - pytest-rerunfailures
  - doctest
